name: Publish LevelDesignTeachingPack v1.0.0

on:
  push:
    paths:
      - payload/READY

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct distribution ZIP
        shell: bash
        run: |
          cat payload/part-* > payload.b64
          base64 --decode payload.b64 > LevelDesignTeachingPack_v1.0.0.zip
          echo "ff2be67d882564e92c614ca2df22f91d923ee07b190c5796995919e3f639dc76  LevelDesignTeachingPack_v1.0.0.zip" | sha256sum --check --strict
          unzip -t LevelDesignTeachingPack_v1.0.0.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create v1.0.0 \
            LevelDesignTeachingPack_v1.0.0.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "Level Design Teaching Pack v1.0.0" \
            --notes "Unity 6000.3.19f1対応の学生配布版です。ZIPを展開し、Unity Hubからプロジェクトフォルダを開いてください。"
