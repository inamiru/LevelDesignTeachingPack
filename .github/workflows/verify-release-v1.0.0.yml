name: Verify Release v1.0.0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and verify release asset
        shell: bash
        run: |
          set +e
          ASSET_NAME="LevelDesignTeachingPack_v1.0.0.zip"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v1.0.0/${ASSET_NAME}"
          EXPECTED="ff2be67d882564e92c614ca2df22f91d923ee07b190c5796995919e3f639dc76"
          rm -rf verification extracted "$ASSET_NAME"
          mkdir -p verification extracted
          {
            curl --fail --location --retry 3 -o "$ASSET_NAME" "$ASSET_URL" || exit 11
            echo "Download: PASSED"
            ACTUAL="$(sha256sum "$ASSET_NAME" | awk '{print $1}')"
            echo "Actual SHA-256: $ACTUAL"
            test "$ACTUAL" = "$EXPECTED" || exit 12
            echo "SHA-256 comparison: PASSED"
            unzip -t "$ASSET_NAME" || exit 13
            echo "ZIP integrity: PASSED"
            unzip -q "$ASSET_NAME" -d extracted || exit 14
            ROOT="$(find extracted -type d -name Assets -print -quit | sed 's#/Assets$##')"
            echo "Detected project root: $ROOT"
            test -n "$ROOT" || exit 15
            test -d "$ROOT/Assets" || exit 15
            test -d "$ROOT/Packages" || exit 16
            test -d "$ROOT/ProjectSettings" || exit 17
            test -f "$ROOT/ProjectSettings/ProjectVersion.txt" || exit 18
            grep -q "m_EditorVersion: 6000.3.19f1" "$ROOT/ProjectSettings/ProjectVersion.txt" || exit 19
            echo "Unity project structure: PASSED"
            echo "Unity version: 6000.3.19f1"
            echo "Release verification: PASSED"
          } > verification/v1.0.0-report.txt 2>&1
          STATUS=$?
          [ "$STATUS" -eq 0 ] || echo "Release verification: FAILED (exit $STATUS)" >> verification/v1.0.0-report.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification/v1.0.0-report.txt
          git commit -m "Record v1.0.0 release verification report" || true
          git push
          exit "$STATUS"
